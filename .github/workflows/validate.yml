name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin structure
        run: ./scripts/ci/validate-plugin.sh

      - name: Check skill SDK import consistency
        run: ./scripts/ci/check-skill-consistency.sh
